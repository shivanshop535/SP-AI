<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP AI | Advanced Study Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --primary: #9d50bb;
            --secondary: #6e48aa;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --bg-dark: #0f0c29;
            --text: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Animated Moving Background */
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #6e48aa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            color: var(--text);
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Sidebar Glassmorphism */
        #sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .logo-area {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #d1a3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .new-chat:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        /* Main Chat Layout */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scrollbar-width: none;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            animation: slideUp 0.4s ease forwards;
            backdrop-filter: blur(5px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-wrapper {
            padding: 20px 40px 40px;
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .btn:hover { color: var(--primary); transform: scale(1.1); }

        /* Loading Animation */
        .typing { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; opacity: 0.4; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="logo-area">
            <span class="material-symbols-rounded" style="font-size: 32px; color: #d1a3ff;">Auto_Awesome</span>
            SP AI
        </div>
        <button class="new-chat" onclick="window.location.reload()">
            <span class="material-symbols-rounded">add</span>
            New Session
        </button>
        <div style="font-size: 12px; color: #888; margin-top: auto; text-align: center;">
            Powered by Gemini 1.5 Flash
        </div>
    </aside>

    <main id="main">
        <div id="chat-container">
            <div class="message ai-msg">
                Welcome to <b>SP AI</b>. I am optimized for your study needs. How can I help you excel today?
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <label for="file-upload" class="btn">
                    <span class="material-symbols-rounded">attach_file</span>
                </label>
                <input type="file" id="file-upload" hidden>
                
                <input type="text" id="user-input" placeholder="Ask SP AI anything...">
                
                <button class="btn" id="send-btn">
                    <span class="material-symbols-rounded" style="color: var(--primary);">send</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "AIzaSyAYZckAkzMQiAf_cYwYR-Ps752OQ6XhWL0";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function callGemini(prompt) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
                    })
                });

                const data = await response.json();
                
                // Fix: Check if data and candidates exist before accessing
                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                    return data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    return `⚠️ API Error: ${data.error.message}`;
                } else {
                    return "I'm sorry, I couldn't process that. Please try rephrasing.";
                }
            } catch (error) {
                return "Connection error. Please check your internet or API key.";
            }
        }

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msg.innerHTML = text.replace(/\n/g, '<br>');
            chatContainer.appendChild(msg);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function addLoading() {
            const loading = document.createElement('div');
            loading.className = 'message ai-msg';
            loading.id = 'temp-loading';
            loading.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            
            addLoading();

            const response = await callGemini(text);
            
            document.getElementById('temp-loading').remove();
            addMessage(response, false);
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
        
        // Attachment feedback
        document.getElementById('file-upload').addEventListener('change', (e) => {
            if(e.target.files[0]) addMessage(`📎 File attached: ${e.target.files[0].name}`, true);
        });
    </script>
</body>
</html>
